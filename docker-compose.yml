# ---------------------------------------------------------------------------
# FitForge90 — production compose file
#
# Values below were inventoried live from the target VPS (srv1297445.hstgr.cloud)
# on 2026-04-19:
#   - Traefik container:       n8n-traefik-1  (v3.6.6)
#   - Traefik docker network:  n8n_n8n_network
#   - Entrypoints:              web (:80 → redirect) + websecure (:443)
#   - ACME cert resolver:       mytlschallenge  (TLS-ALPN-01)
#   - Supabase stack network:   supabase_internal
#
# Before `docker compose up -d`:
#   1. Copy .env.example to /opt/fitforge90/.env with real values
#   2. Point the DNS for fitforge.operscale.cloud at the VPS IP (72.61.201.148)
#   3. Confirm n8n-traefik-1 is running: `docker ps | grep traefik`
# ---------------------------------------------------------------------------

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_APP_TZ: ${NEXT_PUBLIC_APP_TZ:-Africa/Lagos}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    image: fitforge90:latest
    container_name: fitforge90-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: '3000'
    networks:
      - traefik-proxy
      - supabase_internal
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy

      # HTTPS router
      - traefik.http.routers.fitforge.rule=Host(`fitforge.operscale.cloud`)
      - traefik.http.routers.fitforge.entrypoints=websecure
      - traefik.http.routers.fitforge.tls=true
      - traefik.http.routers.fitforge.tls.certresolver=mytlschallenge
      - traefik.http.services.fitforge.loadbalancer.server.port=3000

      # Security headers middleware
      - traefik.http.middlewares.fitforge-headers.headers.stsSeconds=63072000
      - traefik.http.middlewares.fitforge-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.fitforge-headers.headers.stsPreload=true
      - traefik.http.middlewares.fitforge-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.fitforge-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.fitforge-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.routers.fitforge.middlewares=fitforge-headers@docker

networks:
  # Traefik proxy network (inventoried from the VPS — see header).
  traefik-proxy:
    external: true
    name: n8n_n8n_network

  # Supabase internal bridge — reach kong/postgrest/auth directly without
  # hair-pinning through the public DNS.
  supabase_internal:
    external: true
    name: supabase_internal
