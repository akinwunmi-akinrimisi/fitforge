name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Stub values so `next build` / type-checking don't fail on missing env.
      # Real values live in Docker secrets on the VPS.
      NEXT_PUBLIC_SUPABASE_URL: https://supabase.example.com
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key-1234567890
      NEXT_PUBLIC_SITE_URL: https://fitforge.example.com
      NEXT_PUBLIC_APP_TZ: Africa/Lagos
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-1234567890

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
